<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>转运清单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: #fff;
      color: #222;
      font-size: 15px;
      line-height: 1.5;
      padding: 40px 20px 60px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #999; font-size: 13px; margin-bottom: 32px; }
    .group { margin-bottom: 28px; }
    .group-name { font-size: 13px; color: #999; margin-bottom: 8px; }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .item-name { flex: 1; min-width: 0; }
    .item-name small { display: block; font-size: 12px; color: #aaa; margin-top: 1px; }
    .tags { display: flex; gap: 10px; flex-shrink: 0; }
    .tag {
      font-size: 11px;
      color: #ddd;
      width: 36px;
      text-align: center;
    }
    .tag.on { color: #333; font-weight: 600; }
    .foot { margin-top: 40px; font-size: 12px; color: #ccc; text-align: center; }
    .err { color: #d44; font-size: 13px; }
    @media (max-width: 480px) {
      .tags { gap: 8px; }
      .tag { width: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>转运清单</h1>
    <p class="sub">不含食品 · 只读展示 · /*__META__*/</p>
    <div id="list"></div>
    <p class="foot">勾选请在本地版操作，这里不会保存任何改动</p>
  </div>
  <script>
    const ORDER = ["冬季保暖", "冬季小物", "文具", "日用品", "电子产品", "其他"];
    const FIELDS = ["bought", "opened", "packed"];
    const LABELS = ["已买", "已拆", "已装箱"];

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;");
    }

    function render(items) {
      const groups = {};
      items.forEach(i => {
        if (!groups[i.cat]) groups[i.cat] = [];
        groups[i.cat].push(i);
      });
      document.getElementById("list").innerHTML = ORDER
        .filter(c => groups[c])
        .map(cat => `
          <div class="group">
            <div class="group-name">${cat}</div>
            ${groups[cat].map(item => `
              <div class="item">
                <div class="item-name">
                  ${esc(item.name)}
                  ${item.note ? `<small>${esc(item.note)}</small>` : ""}
                </div>
                <div class="tags">
                  ${FIELDS.map((f, i) => `
                    <span class="tag${item[f] ? " on" : ""}">${LABELS[i]}</span>
                  `).join("")}
                </div>
              </div>
            `).join("")}
          </div>
        `).join("");
    }

    const items = /*__DATA__*/;
    render(items);
  </script>
</body>
</html>
